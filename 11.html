<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Expressive</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let mic, fft;
    let mainLayer, attackLayer;

    // アタック（音の立ち上がり）検知用
    let prevEnergy = 0;
    const ATTACK_THRESHOLD = 20;

    function setup() {
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      mainLayer = createGraphics(800, 800, SVG);
      attackLayer = createGraphics(800, 800, SVG);

      [mainLayer, attackLayer].forEach(layer => {
        layer.strokeCap(ROUND);
        layer.translate(width / 2, height / 2);
      });

      background(0);

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.8, 256); // 周波数解像度を少し下げる
      fft.setInput(mic);
    }

    function draw() {
      if (!mic.enabled || !fft) return;

      let spectrum = fft.analyze(); // スペクトル全体を取得
      let totalEnergy = spectrum.reduce((a, b) => a + b, 0);
      if (totalEnergy < 500) return;

      let centroid = fft.getCentroid(); // スペクトル重心を取得
      let midEnergy = fft.getEnergy("mid");
      let highEnergy = fft.getEnergy("treble", "highMid");


      // アプローチ2: スペクトル重心で全体をゆっくり回転させる
      let rotation = map(centroid, 0, 4000, -0.01, 0.01);
      mainLayer.rotate(rotation);

      // アプローチ1: スペクトル全体を使い、ギザギザのポリゴンを描画
      // 低音〜中音域が形状に大きく影響する
      mainLayer.strokeWeight(map(midEnergy, 0, 255, 0.2, 2));
      mainLayer.stroke(255, 40);
      mainLayer.noFill();
      mainLayer.beginShape();
      for (let i = 0; i < spectrum.length; i++) {
        let angle = map(i, 0, spectrum.length, 0, TWO_PI);
        let amp = spectrum[i];
        let r = map(amp, 0, 255, 50, 350);
        let x = r * cos(angle);
        let y = r * sin(angle);
        mainLayer.vertex(x, y);
      }
      mainLayer.endShape(CLOSE);

      // アプローチ1: アタック（音の立ち上がり）を検知
      let currentEnergy = fft.getEnergy("highMid");
      if (currentEnergy > prevEnergy + ATTACK_THRESHOLD) {
        // アタック発生時に放射線を描画
        attackLayer.stroke(255, 180);
        attackLayer.strokeWeight(random(0.5, 2));
        for (let i = 0; i < 10; i++) {
          let angle = random(TWO_PI);
          let r1 = random(100, 200);
          let r2 = r1 + random(150, 250);
          let x1 = r1 * cos(angle);
          let y1 = r1 * sin(angle);
          let x2 = r2 * cos(angle);
          let y2 = r2 * sin(angle);
          attackLayer.line(x1, y1, x2, y2);
        }
      }
      prevEnergy = currentEnergy;


      // メインキャンバスに各レイヤーを描画
      background(0);
      image(mainLayer, 0, 0);
      image(attackLayer, 0, 0);
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        clear();
        background(0);
        image(mainLayer, 0, 0);
        image(attackLayer, 0, 0);
        save("sound_expression.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
