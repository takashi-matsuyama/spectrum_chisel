<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Centered</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let mic, fft;

    function setup() {
      // 修正点2: キャンバスを作成し、特定のdivに配置する
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      background(0);
      strokeCap(ROUND);

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.9, 512);
      fft.setInput(mic);

      frameRate(10);
    }

    function draw() {
      translate(width / 2, height / 2);

      if (!mic.enabled || !fft) return;

      let spectrum = fft.analyze();
      if (spectrum.reduce((a, b) => a + b, 0) < 100) return;

      let lowEnergy = fft.getEnergy("bass");
      let midEnergy = fft.getEnergy("mid");
      let highEnergy = fft.getEnergy("treble");

      if (lowEnergy > 50) {
        stroke(255, 20);
        strokeWeight(map(lowEnergy, 50, 200, 0.3, 1.2));
        noFill();
        beginShape();
        let noiseFactor = map(lowEnergy, 50, 200, 20, 100);
        let angleOffset = frameCount * 0.01;
        for (let i = 0; i < TWO_PI; i += 0.1) {
          let r = map(lowEnergy, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor;
          let x = r * cos(i);
          let y = r * sin(i);
          vertex(x, y);
        }
        endShape(CLOSE);
      }

      if (midEnergy > 40) {
        stroke(255, 60);
        strokeWeight(map(midEnergy, 50, 200, 0.5, 2));
        let baseRadius = map(midEnergy, 50, 200, 90, 300);
        for (let i = 0; i < 5; i++) {
          let angle = random(TWO_PI) + frameCount * 0.05;
          let radius = baseRadius + random(-20, 20);
          let x = radius * cos(angle);
          let y = radius * sin(angle);
          point(x, y);
        }
      }

      if (highEnergy > 50) {
        stroke(255);
        strokeWeight(map(highEnergy, 50, 200, 0.2, 0.8));
        noFill();
        for (let i = 0; i < 3; i++) {
          let angle = random(TWO_PI);
          let r1 = map(highEnergy, 50, 200, 260, 320);
          let r2 = r1 + random(30, 70);
          let x1 = r1 * cos(angle);
          let y1 = r1 * sin(angle);
          let x2 = r2 * cos(angle);
          let y2 = r2 * sin(angle);
          line(x1, y1, x2, y2);
        }
      }
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        save("sound_composition.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
