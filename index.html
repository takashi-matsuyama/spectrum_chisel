<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Fallback to Mic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let lowLayer, midLayer, highLayer;
    let lowCenter, midCenter, highCenter;
    let sound, fft, mic;

    // 変更点1: マイクを使用するかどうかの状態を管理する変数
    let useMic = false;

    function preload() {
      // preloadからloadSoundを外すため空にする
    }

    function setup() {
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      lowLayer = createGraphics(800, 800, SVG);
      midLayer = createGraphics(800, 800, SVG);
      highLayer = createGraphics(800, 800, SVG);

      [lowLayer, midLayer, highLayer].forEach(layer => {
        layer.strokeCap(ROUND);
        layer.translate(width / 2, height / 2);
      });

      lowCenter = createVector(0, 0);
      midCenter = createVector(0, 0);
      highCenter = createVector(0, 0);

      background(0);

      fft = new p5.FFT(0.9, 512); // FFTオブジェクトを作成。0.9はスムージング係数、512はFFTのバンド数（解析精度）

      // 変更点2: setup内でloadSoundを呼び出し、成功失敗で処理を分岐
      loadSound(
        "sound.mp3",
        // 成功時の処理
        (loadedSound) => {
          sound = loadedSound;
          console.log("sound.mp3 loaded successfully.");
          sound.loop(() => {
            fft.setInput(sound); // 音声ファイルをFFTの入力に設定
            console.log("FFT input set to sound.");
          });
        },
        // 失敗時の処理
        () => {
          console.warn("Could not find sound.mp3. Switching to microphone input.");
          useMic = true; // マイク使用フラグを立てる
          mic = new p5.AudioIn();
          mic.start(() => {
            fft.setInput(mic); // マイク入力をFFTの入力に設定
            console.log("FFT input set to mic.");
          });
          fft.setInput(mic);
        }
      );

      frameRate(10); // フレームレートを10fpsに設定。描画負荷軽減や視覚的なスムーズさの調整に影響
    }

    function draw() {
      // 変更点3: 入力ソースに応じた準備完了チェック
      if (useMic) {
        if (!mic || !mic.enabled) return; // マイクが準備できていなければ処理を中断
        console.log("Using microphone input.");
      } else {
        if (!sound) return; // 音声ファイルが読み込まれていなければ処理を中断
        console.log("Using sound input.");
      }
      if (!fft) return; // FFTが準備できていなければ処理を中断

      // fft.analyze()は現在の音声信号の周波数スペクトルを配列で返す
      // 配列の各要素は特定の周波数帯のエネルギー量（音の強さ）を表す
      let spectrum = fft.analyze();

      // 全周波数帯のエネルギーの合計を計算し、音の総エネルギーの指標とする
      let totalEnergy = spectrum.reduce((a, b) => a + b, 0);

      // 音の総エネルギーが閾値未満なら描画しない（ノイズ除去や無音時の無駄な描画防止）
      // マイク入力は感度が高いため閾値を低く設定
      if (totalEnergy < (useMic ? 100 : 500)) return;

      // fft.getEnergy("bass"), "mid", "treble"はそれぞれ低音域、中音域、高音域のエネルギーを取得
      // これらの値を使って周波数帯ごとに異なるビジュアル表現を行う
      let lowEnergy = fft.getEnergy("bass");   // 低音域（約20Hz～140Hz）
      let midEnergy = fft.getEnergy("mid");    // 中音域（約140Hz～4000Hz）
      let highEnergy = fft.getEnergy("treble"); // 高音域（約4000Hz～20000Hz）

      // frameCountは描画フレーム数の累積。時間経過に応じた変化を作るために使用
      // 0.005の係数は変化速度を調整。小さいほどゆっくり動く
      let time = frameCount * 0.005;

      // totalEnergyの値に基づいてspread（拡散の大きさ）を計算
      // map()は値をある範囲から別の範囲に線形変換する関数
      // ここではtotalEnergyが500～10000の範囲で20～150のspreadにマッピング
      // spreadが大きいほどノイズでの位置変動が大きくなり、動きが激しくなる
      let spread = map(totalEnergy, 500, 10000, 20, 150, true);

      // noise()はPerlinノイズを返す関数。滑らかなランダム値を生成し、
      // 動きに自然な揺らぎを加えるのに適している
      // ここでは時間に応じて各周波数帯の中心位置を揺らしている
      lowCenter.x = (noise(time) - 0.5) * spread;
      lowCenter.y = (noise(time + 10) - 0.5) * spread;
      midCenter.x = (noise(time + 20) - 0.5) * spread * 0.8;
      midCenter.y = (noise(time + 30) - 0.5) * spread * 0.8;
      highCenter.x = (noise(time + 40) - 0.5) * spread * 1.2;
      highCenter.y = (noise(time + 50) - 0.5) * spread * 1.2;

      // --- 低音域の描画 ---
      // lowEnergyが50を超えた場合のみ描画（閾値は感度の調整用。低すぎるとノイズが多くなる）
      if (lowEnergy > 50) {
        for (let j = 0; j < 3; j++) {
          lowLayer.stroke(255, 10); // 白色で透明度10の線を設定。透明度が低いほど薄くなる
          // strokeWeightは線の太さ。highEnergyに応じて0.2～0.8の範囲で変化
          // 太さが変わることで高音の影響を視覚化
          lowLayer.strokeWeight(map(highEnergy, 50, 200, 0.2, 0.8));
          lowLayer.noFill(); // 塗りつぶしなし
          lowLayer.beginShape(); // 複雑な形状の描画開始

          // noiseFactorは頂点の揺らぎの大きさ。lowEnergyに応じて20～100の範囲で変化
          // 大きいほど形状がよりランダムに歪む
          let noiseFactor = map(lowEnergy, 50, 200, 20, 100);

          // angleOffsetはフレーム数とループインデックスに基づく角度のオフセット
          // これにより複数の波形がずれて描画される
          let angleOffset = frameCount * 0.01 + j * 0.5;

          // 0から2πまで角度をランダムな間隔でループし、頂点を配置
          // random(0.08, 0.15)は次の頂点までの角度間隔のランダム幅
          for (let i = 0; i < TWO_PI; i += random(0.08, 0.15)) {
            // rは半径。lowEnergyに応じて70～250の範囲で変化し、
            // Perlinノイズで揺らぎを加え、jにより段階的に増加
            let r = map(lowEnergy, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor + j * 3;

            // 極座標からデカルト座標に変換
            let x = r * cos(i);
            let y = r * sin(i);
            lowLayer.vertex(x, y); // 頂点を追加
          }
          lowLayer.endShape(CLOSE); // 形状を閉じて描画終了
        }
      }

      // --- 中音域の描画 ---
      // midEnergyが40を超えた場合のみ描画
      if (midEnergy > 40) {
        midLayer.stroke(255, 10); // 白色で薄めの線
        // strokeWeightはmidEnergyに応じて0.5～2の範囲で変化。太いほど目立つ
        midLayer.strokeWeight(map(midEnergy, 50, 200, 0.5, 2));

        // baseRadiusは中音域の基本半径。midEnergyに応じて90～300の範囲で変化
        let baseRadius = map(midEnergy, 50, 200, 90, 300);

        // 5点の点をbaseRadius付近のランダムな位置に描画
        for (let i = 0; i < 5; i++) {
          let angle = random(TWO_PI);
          let r = baseRadius + random(-20, 20);
          midLayer.point(r * cos(angle), r * sin(angle));
        }

        midLayer.noFill();
        midLayer.beginShape();

        // 7頂点の曲線を描画。頂点は時間経過に応じて動き、波打つような形状になる
        for (let i = 0; i < 7; i++) {
          // 頂点の角度を均等に配置しつつ、フレーム数に応じて回転
          let angle = map(i, 0, 6, 0, TWO_PI) + frameCount * 0.03;
          // 半径は時間経過でサイン波的に変動し、動きを生む
          let radius = baseRadius + sin(frameCount * 0.1 + i) * 30;
          let x = radius * cos(angle);
          let y = radius * sin(angle);
          midLayer.curveVertex(x, y); // 曲線の頂点を追加
        }
        midLayer.endShape(CLOSE);
      }

      // --- 高音域の描画 ---
      // highEnergyが50を超えた場合のみ描画
      if (highEnergy > 50) {
        highLayer.stroke(255, 40); // 白色でやや透明度高めの線
        // strokeWeightはlowEnergyに応じて0.3～1.2の範囲で変化。線の太さで低音の影響を表現
        highLayer.strokeWeight(map(lowEnergy, 50, 200, 0.3, 1.2));
        highLayer.noFill();

        // 3本のランダムな線を描画。x,y座標はランダムで配置し、動きのある効果を演出
        for (let i = 0; i < 3; i++) {
          let x1 = random(-320, 320);
          let y1 = random(-20, 20);
          let x2 = x1 + random(30, 70);
          let y2 = y1 + random(-10, 10);
          highLayer.line(x1, y1, x2, y2); // 線を描画
        }
      }

      // 背景を黒でクリアし、各レイヤーをそれぞれの中心位置に描画
      background(0);
      image(lowLayer, lowCenter.x, lowCenter.y);
      image(midLayer, midCenter.y, midCenter.x);
      image(highLayer, highCenter.x, highCenter.y);
    }

    function keyPressed() {
      // 's'キーが押されたらSVGとPNG形式で保存し、描画を停止
      if (key === 's' || key === 'S') {
        clear();
        background(0);
        image(lowLayer, lowCenter.x, lowCenter.y);
        image(midLayer, midCenter.y, midCenter.x);
        image(highLayer, highCenter.x, highCenter.y);
        save("sound_spatial_composition.svg"); // SVG保存
        save("sound_spatial_composition.png"); // PNG保存
        noLoop(); // drawループ停止
      }
    }
  </script>
</body>

</html>
