<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Fallback to Mic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let fft, mic;

    // --- UI要素のグローバル変数宣言 ---
    let lowColorPicker, lowStrokeSlider, lowAlphaSlider;
    let midColorPicker, midStrokeSlider, midAlphaSlider;
    let highColorPicker, highStrokeSlider, highAlphaSlider;
    let subBassColorPicker, subBassStrokeSlider, subBassAlphaSlider;
    let brillianceColorPicker, brillianceStrokeSlider, brillianceAlphaSlider;
    let presenceColorPicker, presenceStrokeSlider, presenceAlphaSlider;
    let lowMidColorPicker, lowMidStrokeSlider, lowMidAlphaSlider;
    let upperMidColorPicker, upperMidStrokeSlider, upperMidAlphaSlider;
    let uiPanel;

    // チェックボックスとUI管理
    let lowEnabledCheckbox, midEnabledCheckbox, highEnabledCheckbox;
    let subBassEnabledCheckbox, brillianceEnabledCheckbox, presenceEnabledCheckbox;
    let lowMidEnabledCheckbox, upperMidEnabledCheckbox;
    let uiElements = [];
    let uiVisible = true;

    // 変更点1: マイクを使用するかどうかの状態を管理する変数
    let useMic = false;

    function preload() {
      // preloadからloadSoundを外すため空にする
    }

    function generateDistinctColors(count) {
      colorMode(HSB, 360, 100, 100);
      const colors = [];
      let whiteLikeCount = 0;
      let attempts = 0;
      let baseHue = random(0, 360); // 毎回ランダムな開始色
      while (colors.length < count && attempts < 100) {
        let hue = (baseHue + colors.length * (360 / count) + random(-20, 20)) % 360;
        let sat = random(60, 100);
        let bri = random(70, 100);
        if (sat > 95 && bri > 95) {
          if (whiteLikeCount >= 1) {
            attempts++;
            continue;
          }
          whiteLikeCount++;
        }
        colors.push(color(hue, sat, bri));
        attempts++;
      }
      return colors;
    }

    function setup() {
      colorMode(HSB, 360, 100, 100); // HSBカラーモードを一度だけ設定
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      background(0);

      fft = new p5.FFT(0.9, 512); // FFTオブジェクトを作成。0.9はスムージング係数、512はFFTのバンド数（解析精度）

      // --- UIパネルの初期化 ---
      uiPanel = createDiv();
      uiPanel.position(10, 10);
      uiPanel.style('color', 'white');
      uiPanel.style('background', 'rgba(0, 0, 0, 0.6)');
      uiPanel.style('padding', '10px');
      uiPanel.style('border-radius', '8px');
      uiPanel.style('max-width', '90vw');
      uiPanel.style('overflow-y', 'auto');
      uiPanel.style('max-height', '90vh');
      uiPanel.style('font-family', 'sans-serif');
      uiElements.push(uiPanel);

      // ランダム色を取得
      let randomColors = generateDistinctColors(8);

      // --- UI要素の初期化 (低い音域から高い音域へ順番変更) ---
      // 1. SubBass
      createDiv('SubBass Energy').parent(uiPanel).style('color', 'white');
      subBassColorPicker = createColorPicker(randomColors[3]).parent(uiPanel);
      uiElements.push(subBassColorPicker);
      subBassStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(subBassStrokeSlider);
      subBassAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(subBassAlphaSlider);

      // 2. Low
      createDiv('Low Energy').parent(uiPanel).style('color', 'white');
      lowColorPicker = createColorPicker(randomColors[0]).parent(uiPanel);
      uiElements.push(lowColorPicker);
      lowStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(lowStrokeSlider);
      lowAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(lowAlphaSlider);

      // 3. LowMid
      createDiv('LowMid Energy').parent(uiPanel).style('color', 'white');
      lowMidColorPicker = createColorPicker(randomColors[6]).parent(uiPanel);
      uiElements.push(lowMidColorPicker);
      lowMidStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(lowMidStrokeSlider);
      lowMidAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(lowMidAlphaSlider);

      // 4. Mid
      createDiv('Mid Energy').parent(uiPanel).style('color', 'white');
      midColorPicker = createColorPicker(randomColors[1]).parent(uiPanel);
      uiElements.push(midColorPicker);
      midStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(midStrokeSlider);
      midAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(midAlphaSlider);

      // 5. UpperMid
      createDiv('UpperMid Energy').parent(uiPanel).style('color', 'white');
      upperMidColorPicker = createColorPicker(randomColors[7]).parent(uiPanel);
      uiElements.push(upperMidColorPicker);
      upperMidStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(upperMidStrokeSlider);
      upperMidAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(upperMidAlphaSlider);

      // 6. Presence
      createDiv('Presence Energy').parent(uiPanel).style('color', 'white');
      presenceColorPicker = createColorPicker(randomColors[5]).parent(uiPanel);
      uiElements.push(presenceColorPicker);
      presenceStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(presenceStrokeSlider);
      presenceAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(presenceAlphaSlider);

      // 7. Brilliance
      createDiv('Brilliance Energy').parent(uiPanel).style('color', 'white');
      brillianceColorPicker = createColorPicker(randomColors[4]).parent(uiPanel);
      uiElements.push(brillianceColorPicker);
      brillianceStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(brillianceStrokeSlider);
      brillianceAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(brillianceAlphaSlider);

      // 8. High
      createDiv('High Energy').parent(uiPanel).style('color', 'white');
      highColorPicker = createColorPicker(randomColors[2]).parent(uiPanel);
      uiElements.push(highColorPicker);
      highStrokeSlider = createSlider(0.1, 5, 1, 0.1).parent(uiPanel);
      uiElements.push(highStrokeSlider);
      highAlphaSlider = createSlider(0, 255, 20, 1).parent(uiPanel);
      uiElements.push(highAlphaSlider);

      // 音域ごとの描画ON/OFFチェックボックスとラベル（低音域から高音域へ）
      // 1. SubBass
      createDiv('SubBass').parent(uiPanel).style('color', 'white');
      subBassEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(subBassEnabledCheckbox);
      // 2. Low
      createDiv('Low').parent(uiPanel).style('color', 'white');
      lowEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(lowEnabledCheckbox);
      // 3. LowMid
      createDiv('LowMid').parent(uiPanel).style('color', 'white');
      lowMidEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(lowMidEnabledCheckbox);
      // 4. Mid
      createDiv('Mid').parent(uiPanel).style('color', 'white');
      midEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(midEnabledCheckbox);
      // 5. UpperMid
      createDiv('UpperMid').parent(uiPanel).style('color', 'white');
      upperMidEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(upperMidEnabledCheckbox);
      // 6. Presence
      createDiv('Presence').parent(uiPanel).style('color', 'white');
      presenceEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(presenceEnabledCheckbox);
      // 7. Brilliance
      createDiv('Brilliance').parent(uiPanel).style('color', 'white');
      brillianceEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(brillianceEnabledCheckbox);
      // 8. High
      createDiv('High').parent(uiPanel).style('color', 'white');
      highEnabledCheckbox = createCheckbox('Draw', true).parent(uiPanel);
      uiElements.push(highEnabledCheckbox);

      // 変更点: sound.mp3の読み込みロジックを削除し、マイク入力に切り替え
      useMic = true;
      initMic();

      frameRate(10); // フレームレートを10fpsに設定。描画負荷軽減や視覚的なスムーズさの調整に影響
    }

    // マイク初期化関数
    function initMic() {
      useMic = true;
      mic = new p5.AudioIn();
      mic.start(() => {
        fft.setInput(mic);
        console.log("FFT input set to mic.");
      });
      fft.setInput(mic);
    }

    function draw() {
      // 変更点3: 入力ソースに応じた準備完了チェック
      if (useMic) {
        if (!mic || !mic.enabled) return; // マイクが準備できていなければ処理を中断
        console.log("Using microphone input.");
      } else {
        // 将来的な拡張のために音声ファイル入力の条件を残している
        // 現状はマイク入力のみなのでこの分岐は実質使われない
        console.log("Using sound input.");
      }
      if (!fft) return; // FFTが準備できていなければ処理を中断

      // fft.analyze()は現在の音声信号の周波数スペクトルを配列で返す
      // 配列の各要素は特定の周波数帯のエネルギー量（音の強さ）を表す
      let spectrum = fft.analyze();

      // 全周波数帯のエネルギーの合計を計算し、音の総エネルギーの指標とする
      let totalEnergy = spectrum.reduce((a, b) => a + b, 0);

      // 音の総エネルギーが閾値未満なら描画しない（ノイズ除去や無音時の無駄な描画防止）
      // マイク入力は感度が高いため閾値を低く設定
      // 将来的な拡張のために条件を残している
      if (totalEnergy < (useMic ? 100 : 500)) return;

      // fft.getEnergy("bass"), "mid", "treble"はそれぞれ低音域、中音域、高音域のエネルギーを取得
      // これらの値を使って周波数帯ごとに異なるビジュアル表現を行う
      let subBassEnergy = fft.getEnergy(20, 60); // 低低音域（約20Hz～60Hz）
      let lowEnergy = fft.getEnergy("bass");   // 低音域（約20Hz～140Hz）
      let lowMidEnergy = fft.getEnergy(140, 400); // 低中音域（約140Hz～400Hz）
      let midEnergy = fft.getEnergy("mid"); // 中音域（約140Hz～4000Hz）
      let upperMidEnergy = fft.getEnergy(1000, 3000); // 高中音域（約1000Hz～3000Hz）
      let presenceEnergy = fft.getEnergy(3000, 6000); // 低高音域（約3000Hz～6000Hz）
      let brillianceEnergy = fft.getEnergy(6000, 16000); // 中高音域（約6000Hz～16000Hz）
      let highEnergy = fft.getEnergy("treble"); // 高音域（約4000Hz～20000Hz）

      // frameCountは描画フレーム数の累積。時間経過に応じた変化を作るために使用
      // 0.005の係数は変化速度を調整。小さいほどゆっくり動く
      let time = frameCount * 0.005;

      translate(width / 2, height / 2);

      // --- 関数化した音域描画 ---
      // lowEnergy
      if (lowEnabledCheckbox && lowEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = lowEnergy;
          let baseAmount = 12;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let angle = frameCount * 0.02;
          let dx = sin(angle + time) * baseAmount * intensity;
          let dy = cos(angle + time * 1.5) * baseAmount * intensity;
          console.log("OFFSET lowEnergy:", dx, dy);
          translate(dx, dy);
          drawLowEnergy(lowEnergy, frameCount, time);
        }
        pop();
      }

      // midEnergy
      if (midEnabledCheckbox && midEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = midEnergy;
          let OFFSET = 2;
          let baseAmount = 10;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET midEnergy:", dx, dy);
          translate(dx, dy);
          drawMidEnergy(midEnergy, frameCount, time);
        }
        pop();
      }

      // highEnergy
      if (highEnabledCheckbox && highEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = highEnergy;
          let OFFSET = 3;
          let baseAmount = 16;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET highEnergy:", dx, dy);
          translate(dx, dy);
          drawHighEnergy(highEnergy, frameCount, time);
        }
        pop();
      }

      // subBassEnergy
      if (subBassEnabledCheckbox && subBassEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = subBassEnergy;
          let OFFSET = 4;
          let baseAmount = 14;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET subBassEnergy:", dx, dy);
          translate(dx, dy);
          drawSubBassEnergy(subBassEnergy, time);
        }
        pop();
      }

      // brillianceEnergy
      if (brillianceEnabledCheckbox && brillianceEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = brillianceEnergy;
          let OFFSET = 5;
          let baseAmount = 20;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET brillianceEnergy:", dx, dy);
          translate(dx, dy);
          drawBrillianceEnergy(brillianceEnergy, time, frameCount);
        }
        pop();
      }

      // presenceEnergy
      if (presenceEnabledCheckbox && presenceEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = presenceEnergy;
          let OFFSET = 6;
          let baseAmount = 18;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET presenceEnergy:", dx, dy);
          translate(dx, dy);
          drawPresenceEnergy(presenceEnergy, frameCount);
        }
        pop();
      }

      // lowMidEnergy
      if (lowMidEnabledCheckbox && lowMidEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = lowMidEnergy;
          let OFFSET = 7;
          let baseAmount = 11;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET lowMidEnergy:", dx, dy);
          translate(dx, dy);
          drawLowMidEnergy(lowMidEnergy, time);
        }
        pop();
      }

      // upperMidEnergy
      if (upperMidEnabledCheckbox && upperMidEnabledCheckbox.checked()) {
        push();
        {
          let energyValue = upperMidEnergy;
          let OFFSET = 8;
          let baseAmount = 13;
          let intensity = map(energyValue, 0, 255, 0, 1);
          let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
          let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
          console.log("OFFSET upperMidEnergy:", dx, dy);
          translate(dx, dy);
          drawUpperMidEnergy(upperMidEnergy);
        }
        pop();
      }
    }

    function keyPressed() {
      // 's'キーが押されたらSVG保存
      if (key === 's' || key === 'S') {
        save("sound_spatial_composition.svg");
        // PNG保存もしたい場合は下記コメントアウト解除
        // save("sound_spatial_composition.png");
        // noLoop();
      }
      // 'c'キーでUI表示切り替え
      if (key === 'c' || key === 'C') {
        uiVisible = !uiVisible;
        uiPanel.style('display', uiVisible ? 'block' : 'none');
      }
      // 'e'キーでキャンバスをクリア（描画リセット）
      if (key === 'e' || key === 'E') {
        clear(); // 背景と描画をすべてリセット
        background(0); // 背景色を黒で再設定
      }
    }

    // --- 各音域の描画処理 ---
    function drawLowEnergy(lowEnergy, frameCount, time) {
      // --- UIで指定した色・太さを適用 ---
      let c = lowColorPicker.color();
      c.setAlpha(lowAlphaSlider.value());
      stroke(c);
      strokeWeight(lowStrokeSlider.value());
      if (lowEnergy > 50) {
        for (let j = 0; j < 3; j++) {
          noFill();
          beginShape();
          let noiseFactor = map(lowEnergy, 50, 200, 20, 100);
          let angleOffset = frameCount * 0.01 + j * 0.5;
          for (let i = 0; i < TWO_PI; i += random(0.08, 0.15)) {
            let r = map(lowEnergy, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor + j * 3;
            let x = r * cos(i);
            let y = r * sin(i);
            vertex(x, y);
          }
          endShape(CLOSE);
        }
      }
    }

    function drawMidEnergy(midEnergy, frameCount, time) {
      if (midEnergy > 40) {
        let c = midColorPicker.color();
        c.setAlpha(midAlphaSlider.value());
        stroke(c);
        strokeWeight(midStrokeSlider.value());
        // 回転: エネルギー依存
        let rot = map(midEnergy, 40, 255, 0, PI / 2) + frameCount * 0.01;
        rotate(rot);
        let baseRadius = map(midEnergy, 50, 200, 90, 300);
        let detail = floor(map(midEnergy, 40, 255, 3, 12));
        // 中心の空洞半径
        let innerRadius = map(midEnergy, 40, 200, 40, 80);
        // ドット描画ロジックは削除
        noFill();
        beginShape();
        for (let i = 0; i < detail + 2; i++) {
          let angle = map(i, 0, detail + 1, 0, TWO_PI) + frameCount * 0.03;
          let radius = baseRadius + sin(frameCount * 0.1 + i) * 30;
          // 始点の揺らぎを追加
          let x = (random(2, 20)) * cos(angle) + radius * cos(angle);
          let y = (random(2, 20)) * sin(angle) + radius * sin(angle);
          curveVertex(x, y);
        }
        endShape(CLOSE);
      }
    }

    function drawHighEnergy(highEnergy, frameCount, time) {
      if (highEnergy > 50) {
        let c = highColorPicker.color();
        c.setAlpha(highAlphaSlider.value());
        stroke(c);
        strokeWeight(highStrokeSlider.value());
        noFill();
        // 回転: エネルギー依存
        let rot = map(highEnergy, 50, 255, 0, PI) + frameCount * 0.05;
        rotate(rot);
        let detail = floor(map(highEnergy, 50, 255, 2, 8));
        for (let i = 0; i < detail; i++) {
          // 始点の揺らぎを狭める
          let x1 = random(-20, 20);
          let y1 = random(-20, 20);
          let x2 = x1 + random(30, 70);
          let y2 = y1 + random(-10, 10);
          line(x1, y1, x2, y2);
        }
      }
    }

    function drawSubBassEnergy(subBassEnergy, time) {
      if (subBassEnergy > 30) {
        let c = subBassColorPicker.color();
        c.setAlpha(subBassAlphaSlider.value());
        stroke(c);
        strokeWeight(subBassStrokeSlider.value());
        noFill();
        // 回転: エネルギー依存
        let rot = map(subBassEnergy, 30, 255, 0, PI / 3) + time * 0.2;
        rotate(rot);
        // 楕円描画ロジックは削除
        // 成長するドットの輪を追加（音エネルギーに応じて拡大）
        let ringCount = 1 + floor(map(subBassEnergy, 30, 255, 1, 5));
        for (let r = 0; r < ringCount; r++) {
          let radius = map(subBassEnergy, 30, 255, 40, 160) + r * 8;
          let dotCount = floor(TWO_PI * radius / 12);
          for (let i = 0; i < dotCount; i++) {
            let angle = (TWO_PI / dotCount) * i;
            let x = cos(angle) * radius;
            let y = sin(angle) * radius;
            strokeWeight(random(0.5, 1.2));
            point(x, y);
          }
        }
      }
    }

    function drawBrillianceEnergy(brillianceEnergy, time, frameCount) {
      if (brillianceEnergy > 30) {
        let c = brillianceColorPicker.color();
        c.setAlpha(brillianceAlphaSlider.value());
        stroke(c);
        strokeWeight(brillianceStrokeSlider.value());
        noFill();
        // 回転: エネルギー依存
        let rot = map(brillianceEnergy, 30, 255, 0, PI) + time * 1.2;
        rotate(rot);
        let rays = 10 + floor(map(brillianceEnergy, 30, 200, 2, 15));
        let baseLen = map(brillianceEnergy, 30, 200, 120, 300);
        let detail = floor(map(brillianceEnergy, 30, 255, 1, 3));
        let innerRadius = map(brillianceEnergy, 30, 200, 40, 80);
        for (let d = 0; d < detail; d++) {
          for (let i = 0; i < rays; i++) {
            let angle = (TWO_PI / rays) * i + time * 1.2 + d * 0.2;
            let len = baseLen + sin(time * 2 + i + d) * 24 + random(-6, 6);
            // 中央に空白を空けるため始点を内側の円周上に固定
            let x1 = cos(angle) * innerRadius;
            let y1 = sin(angle) * innerRadius;
            let x2 = cos(angle) * len;
            let y2 = sin(angle) * len;
            line(x1, y1, x2, y2);
          }
        }
      }
    }

    function drawPresenceEnergy(presenceEnergy, frameCount) {
      if (presenceEnergy > 30) {
        let c = presenceColorPicker.color();
        c.setAlpha(presenceAlphaSlider.value());
        stroke(c);
        strokeWeight(presenceStrokeSlider.value());
        noFill();
        // 回転: エネルギー依存
        let rot = map(presenceEnergy, 30, 255, 0, PI / 2) + frameCount * 0.1;
        rotate(rot);
        let sparkCount = floor(map(presenceEnergy, 30, 255, 4, 16));
        let maxLength = map(presenceEnergy, 30, 200, 30, 100);
        let detail = floor(map(presenceEnergy, 30, 255, 1, 3));
        for (let d = 0; d < detail; d++) {
          for (let i = 0; i < sparkCount; i++) {
            let angle = (TWO_PI / sparkCount) * i + frameCount * 0.1 + d * 0.13;
            // 揺らぎを加える
            let x1 = cos(angle) * random(2, 20);
            let y1 = sin(angle) * random(2, 20);
            let x2 = x1 + cos(angle) * random(maxLength * 0.5, maxLength);
            let y2 = y1 + sin(angle) * random(maxLength * 0.5, maxLength);
            line(x1, y1, x2, y2);
          }
        }
      }
    }

    function drawLowMidEnergy(lowMidEnergy, time) {
      if (lowMidEnergy > 20) {
        let c = lowMidColorPicker.color();
        c.setAlpha(lowMidAlphaSlider.value());
        stroke(c);
        strokeWeight(lowMidStrokeSlider.value());
        noFill();
        // 回転: エネルギー依存
        let rot = map(lowMidEnergy, 20, 255, 0, PI / 2) + time * 0.2;
        rotate(rot);
        let baseA = map(lowMidEnergy, 20, 200, 80, 220);
        let baseB = map(lowMidEnergy, 20, 200, 60, 180);
        let waviness = map(lowMidEnergy, 20, 200, 6, 25);
        let waveCount = 2 + floor(map(lowMidEnergy, 20, 200, 2, 8));
        let detail = floor(map(lowMidEnergy, 20, 255, 1, 3));
        for (let d = 0; d < detail; d++) {
          beginShape();
          for (let t = 0; t < TWO_PI; t += 0.05) {
            let a = baseA + sin(t * waveCount + time * 2 + d) * waviness;
            let b = baseB + cos(t * waveCount + time * 2 + d) * (waviness * 0.6);
            // wave中心を少しズラす
            let x = (a + random(-8, 8)) * cos(t);
            let y = (b + random(-8, 8)) * sin(t);
            curveVertex(x, y);
          }
          endShape(CLOSE);
        }
      }
    }

    function drawUpperMidEnergy(upperMidEnergy) {
      if (upperMidEnergy > 30) {
        let c = upperMidColorPicker.color();
        c.setAlpha(upperMidAlphaSlider.value());
        stroke(c);
        strokeWeight(upperMidStrokeSlider.value());
        // 回転: エネルギー依存
        let rot = map(upperMidEnergy, 30, 255, 0, PI * 2) * 0.3;
        rotate(rot);
        let count = floor(map(upperMidEnergy, 30, 255, 20, 100));
        let detail = floor(map(upperMidEnergy, 30, 255, 1, 4));
        for (let d = 0; d < detail; d++) {
          for (let i = 0; i < count; i++) {
            let angle = random(TWO_PI);
            // radiusの起点に揺らぎを加える
            let radius = random(200, 350) + random(-30, 30);
            let x = radius * cos(angle);
            let y = radius * sin(angle);
            point(x, y);
          }
        }
      }
    }
  </script>
