<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Fallback to Mic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <link rel="stylesheet" href="./assets/css/style.css" type="text/css" />
</head>

<body>
  <div id="sound-controls">
    <div class="control-group">
      <label>音源:</label>
      <button id="mic-mode-btn" class="active">マイク入力</button>
      <button id="file-mode-btn">ファイル再生</button>
      <input type="file" id="upload-sound" accept="audio/*" style="display: none;">
    </div>
    <div class="control-group">
      <label>操作:</label>
      <button id="play-pause-btn">再生</button>
      <button id="stop-btn">停止・リセット</button>
    </div>
    <div class="control-group" id="file-volume-group" style="display: none;">
      <label>File Volume:</label>
      <input type="range" id="file-volume-slider" min="0" max="1" value="0.5" step="0.01">
    </div>
  </div>
  <div id="canvas-container" class="canvas-wrapper"></div>
  <div id="ui-container"></div>
  <script src="./assets/js/sketch.js"></script>
</body>

</html>
