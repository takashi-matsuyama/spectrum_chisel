<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <title>Spectrum Chisel</title>
  <link rel="stylesheet" href="./assets/css/style.css" type="text/css" />
  <!-- Cloudflare Web Analytics: cookieless, aggregated page views. -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "8b2b3cc0005b4025ac315cae9f12dfae"}'></script>
</head>

<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <header class="sidebar-header">
        <h1 class="app-title">Spectrum Chisel</h1>
        <div class="lang-toggle" role="group" data-i18n-label="language">
          <button type="button" class="lang-btn" data-lang="ja">JA</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
        <button type="button" id="sidebar-collapse" class="icon-btn" data-i18n-label="hideControls" title="">‹</button>
      </header>

      <div class="sidebar-body">
        <section class="panel-section">
          <h2 class="section-title" data-i18n="sourceSection">音源</h2>
          <div id="sound-controls">
            <div class="control-row">
              <div class="segmented" role="group" data-i18n-label="soundSource">
                <button id="mic-mode-btn" class="seg-btn active" data-i18n="micInput">マイク入力</button>
                <button id="file-mode-btn" class="seg-btn" data-i18n="filePlayback">ファイル再生</button>
              </div>
              <input type="file" id="upload-sound" accept="audio/*" class="hidden">
            </div>

            <div class="control-row" id="mic-controls">
              <label class="field-label">Mic Boost</label>
              <input type="range" id="mic-boost-slider" class="range" min="0.01" max="10" value="2" step="0.01">
              <button id="mic-record-btn" class="btn btn-primary" data-i18n="startDrawing">描画開始</button>
            </div>

            <div class="control-row file-control hidden" id="file-controls">
              <div class="file-playback-controls">
                <button id="play-pause-btn" class="btn" data-i18n="play">再生</button>
                <div id="progress-bar-container">
                  <input type="range" id="progress-bar" class="range" value="0" step="0.01">
                </div>
                <span id="file-time-display" class="mono">0:00 / 0:00</span>
              </div>
              <div class="file-record-controls">
                <label class="field-label">File Volume</label>
                <input type="range" id="file-volume-slider" class="range" min="0.01" max="10" value="0.5" step="0.01">
                <button id="file-record-btn" class="btn btn-primary" data-i18n="startDrawing">描画開始</button>
              </div>
            </div>

            <div class="control-row">
              <label class="field-label" data-i18n="video">動画:</label>
              <button id="video-record-btn" class="btn" data-i18n="startVideoRec">録画開始 (V)</button>
            </div>

            <div class="control-row">
              <button id="reset-btn" class="btn btn-danger" data-i18n="reset">リセット</button>
              <span class="time-readout"><label class="field-label">Time</label><span id="time-display" class="mono">0.0s</span></span>
            </div>
          </div>
        </section>

        <div id="ui-container"></div>

        <footer class="sidebar-footer">
          © 2026 <a href="https://me.tak3.jp" target="_blank" rel="noopener">Takashi Matsuyama</a>
        </footer>
      </div>
    </aside>

    <button type="button" id="sidebar-open" class="icon-btn floating" data-i18n-label="showControls" title="">›</button>

    <main id="canvas-container" class="canvas-wrapper"></main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
