<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Fallback to Mic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let fft, mic;

    // --- UIиҰҒзҙ гҒ®гӮ°гғӯгғјгғҗгғ«еӨүж•°е®ЈиЁҖ ---
    let lowColorPicker, lowStrokeSlider;
    let lowAlphaSlider;

    let midColorPicker, midStrokeSlider, midAlphaSlider;
    let highColorPicker, highStrokeSlider, highAlphaSlider;
    let subBassColorPicker, subBassStrokeSlider, subBassAlphaSlider;
    let brillianceColorPicker, brillianceStrokeSlider, brillianceAlphaSlider;
    let presenceColorPicker, presenceStrokeSlider, presenceAlphaSlider;
    let lowMidColorPicker, lowMidStrokeSlider, lowMidAlphaSlider;
    let upperMidColorPicker, upperMidStrokeSlider, upperMidAlphaSlider;

    // еӨүжӣҙзӮ№1: гғһгӮӨгӮҜгӮ’дҪҝз”ЁгҒҷгӮӢгҒӢгҒ©гҒҶгҒӢгҒ®зҠ¶ж…ӢгӮ’з®ЎзҗҶгҒҷгӮӢеӨүж•°
    let useMic = false;

    function preload() {
      // preloadгҒӢгӮүloadSoundгӮ’еӨ–гҒҷгҒҹгӮҒз©әгҒ«гҒҷгӮӢ
    }

    function setup() {
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      background(0);

      fft = new p5.FFT(0.9, 512); // FFTгӮӘгғ–гӮёгӮ§гӮҜгғҲгӮ’дҪңжҲҗгҖӮ0.9гҒҜгӮ№гғ гғјгӮёгғігӮ°дҝӮж•°гҖҒ512гҒҜFFTгҒ®гғҗгғігғүж•°пјҲи§ЈжһҗзІҫеәҰпјү

      // --- UIиҰҒзҙ гҒ®еҲқжңҹеҢ– ---
      lowColorPicker = createColorPicker('#ff0000');
      lowColorPicker.position(10, 10);
      lowStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      lowStrokeSlider.position(10, 40);
      lowAlphaSlider = createSlider(0, 255, 40, 1);
      lowAlphaSlider.position(10, 70);

      midColorPicker = createColorPicker('#ffa500');
      midColorPicker.position(150, 10);
      midStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      midStrokeSlider.position(150, 40);
      midAlphaSlider = createSlider(0, 255, 50, 1);
      midAlphaSlider.position(150, 70);

      highColorPicker = createColorPicker('#ffff00');
      highColorPicker.position(290, 10);
      highStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      highStrokeSlider.position(290, 40);
      highAlphaSlider = createSlider(0, 255, 50, 1);
      highAlphaSlider.position(290, 70);

      subBassColorPicker = createColorPicker('#00ff00');
      subBassColorPicker.position(430, 10);
      subBassStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      subBassStrokeSlider.position(430, 40);
      subBassAlphaSlider = createSlider(0, 255, 30, 1);
      subBassAlphaSlider.position(430, 70);

      brillianceColorPicker = createColorPicker('#00ffff');
      brillianceColorPicker.position(570, 10);
      brillianceStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      brillianceStrokeSlider.position(570, 40);
      brillianceAlphaSlider = createSlider(0, 255, 40, 1);
      brillianceAlphaSlider.position(570, 70);

      presenceColorPicker = createColorPicker('#0000ff');
      presenceColorPicker.position(710, 10);
      presenceStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      presenceStrokeSlider.position(710, 40);
      presenceAlphaSlider = createSlider(0, 255, 40, 1);
      presenceAlphaSlider.position(710, 70);

      lowMidColorPicker = createColorPicker('#800080');
      lowMidColorPicker.position(10, 110);
      lowMidStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      lowMidStrokeSlider.position(10, 140);
      lowMidAlphaSlider = createSlider(0, 255, 50, 1);
      lowMidAlphaSlider.position(10, 170);

      upperMidColorPicker = createColorPicker('#ff00ff');
      upperMidColorPicker.position(150, 110);
      upperMidStrokeSlider = createSlider(0.1, 5, 1, 0.1);
      upperMidStrokeSlider.position(150, 140);
      upperMidAlphaSlider = createSlider(0, 255, 50, 1);
      upperMidAlphaSlider.position(150, 170);

      // еӨүжӣҙзӮ№: sound.mp3гҒ®иӘӯгҒҝиҫјгҒҝгғӯгӮёгғғгӮҜгӮ’еүҠйҷӨгҒ—гҖҒгғһгӮӨгӮҜе…ҘеҠӣгҒ«еҲҮгӮҠжӣҝгҒҲ
      useMic = true;
      initMic();

      frameRate(10); // гғ•гғ¬гғјгғ гғ¬гғјгғҲгӮ’10fpsгҒ«иЁӯе®ҡгҖӮжҸҸз”»иІ иҚ·и»ҪжёӣгӮ„иҰ–иҰҡзҡ„гҒӘгӮ№гғ гғјгӮәгҒ•гҒ®иӘҝж•ҙгҒ«еҪұйҹҝ
    }

    // гғһгӮӨгӮҜеҲқжңҹеҢ–й–ўж•°
    function initMic() {
      useMic = true;
      mic = new p5.AudioIn();
      mic.start(() => {
        fft.setInput(mic);
        console.log("FFT input set to mic.");
      });
      fft.setInput(mic);
    }

    function draw() {
      // еӨүжӣҙзӮ№3: е…ҘеҠӣгӮҪгғјгӮ№гҒ«еҝңгҒҳгҒҹжә–еӮҷе®ҢдәҶгғҒгӮ§гғғгӮҜ
      if (useMic) {
        if (!mic || !mic.enabled) return; // гғһгӮӨгӮҜгҒҢжә–еӮҷгҒ§гҒҚгҒҰгҒ„гҒӘгҒ‘гӮҢгҒ°еҮҰзҗҶгӮ’дёӯж–ӯ
        console.log("Using microphone input.");
      } else {
        // е°ҶжқҘзҡ„гҒӘжӢЎејөгҒ®гҒҹгӮҒгҒ«йҹіеЈ°гғ•гӮЎгӮӨгғ«е…ҘеҠӣгҒ®жқЎд»¶гӮ’ж®ӢгҒ—гҒҰгҒ„гӮӢ
        // зҸҫзҠ¶гҒҜгғһгӮӨгӮҜе…ҘеҠӣгҒ®гҒҝгҒӘгҒ®гҒ§гҒ“гҒ®еҲҶеІҗгҒҜе®ҹиіӘдҪҝгӮҸгӮҢгҒӘгҒ„
        console.log("Using sound input.");
      }
      if (!fft) return; // FFTгҒҢжә–еӮҷгҒ§гҒҚгҒҰгҒ„гҒӘгҒ‘гӮҢгҒ°еҮҰзҗҶгӮ’дёӯж–ӯ

      // fft.analyze()гҒҜзҸҫеңЁгҒ®йҹіеЈ°дҝЎеҸ·гҒ®е‘Ёжіўж•°гӮ№гғҡгӮҜгғҲгғ«гӮ’й…ҚеҲ—гҒ§иҝ”гҒҷ
      // й…ҚеҲ—гҒ®еҗ„иҰҒзҙ гҒҜзү№е®ҡгҒ®е‘Ёжіўж•°еёҜгҒ®гӮЁгғҚгғ«гӮ®гғјйҮҸпјҲйҹігҒ®еј·гҒ•пјүгӮ’иЎЁгҒҷ
      let spectrum = fft.analyze();

      // е…Ёе‘Ёжіўж•°еёҜгҒ®гӮЁгғҚгғ«гӮ®гғјгҒ®еҗҲиЁҲгӮ’иЁҲз®—гҒ—гҖҒйҹігҒ®з·ҸгӮЁгғҚгғ«гӮ®гғјгҒ®жҢҮжЁҷгҒЁгҒҷгӮӢ
      let totalEnergy = spectrum.reduce((a, b) => a + b, 0);

      // йҹігҒ®з·ҸгӮЁгғҚгғ«гӮ®гғјгҒҢй–ҫеҖӨжңӘжәҖгҒӘгӮүжҸҸз”»гҒ—гҒӘгҒ„пјҲгғҺгӮӨгӮәйҷӨеҺ»гӮ„з„ЎйҹіжҷӮгҒ®з„Ўй§„гҒӘжҸҸз”»йҳІжӯўпјү
      // гғһгӮӨгӮҜе…ҘеҠӣгҒҜж„ҹеәҰгҒҢй«ҳгҒ„гҒҹгӮҒй–ҫеҖӨгӮ’дҪҺгҒҸиЁӯе®ҡ
      // е°ҶжқҘзҡ„гҒӘжӢЎејөгҒ®гҒҹгӮҒгҒ«жқЎд»¶гӮ’ж®ӢгҒ—гҒҰгҒ„гӮӢ
      if (totalEnergy < (useMic ? 100 : 500)) return;

      // fft.getEnergy("bass"), "mid", "treble"гҒҜгҒқгӮҢгҒһгӮҢдҪҺйҹіеҹҹгҖҒдёӯйҹіеҹҹгҖҒй«ҳйҹіеҹҹгҒ®гӮЁгғҚгғ«гӮ®гғјгӮ’еҸ–еҫ—
      // гҒ“гӮҢгӮүгҒ®еҖӨгӮ’дҪҝгҒЈгҒҰе‘Ёжіўж•°еёҜгҒ”гҒЁгҒ«з•°гҒӘгӮӢгғ“гӮёгғҘгӮўгғ«иЎЁзҸҫгӮ’иЎҢгҒҶ
      let subBassEnergy = fft.getEnergy(20, 60); // дҪҺдҪҺйҹіеҹҹпјҲзҙ„20HzпҪһ60Hzпјү
      let lowEnergy = fft.getEnergy("bass");   // дҪҺйҹіеҹҹпјҲзҙ„20HzпҪһ140Hzпјү
      let lowMidEnergy = fft.getEnergy(140, 400); // дҪҺдёӯйҹіеҹҹпјҲзҙ„140HzпҪһ400Hzпјү
      let midEnergy = fft.getEnergy("mid"); // дёӯйҹіеҹҹпјҲзҙ„140HzпҪһ4000Hzпјү
      let upperMidEnergy = fft.getEnergy(1000, 3000); // й«ҳдёӯйҹіеҹҹпјҲзҙ„1000HzпҪһ3000Hzпјү
      let presenceEnergy = fft.getEnergy(3000, 6000); // дҪҺй«ҳйҹіеҹҹпјҲзҙ„3000HzпҪһ6000Hzпјү
      let brillianceEnergy = fft.getEnergy(6000, 16000); // дёӯй«ҳйҹіеҹҹпјҲзҙ„6000HzпҪһ16000Hzпјү
      let highEnergy = fft.getEnergy("treble"); // й«ҳйҹіеҹҹпјҲзҙ„4000HzпҪһ20000Hzпјү

      // frameCountгҒҜжҸҸз”»гғ•гғ¬гғјгғ ж•°гҒ®зҙҜз©ҚгҖӮжҷӮй–“зөҢйҒҺгҒ«еҝңгҒҳгҒҹеӨүеҢ–гӮ’дҪңгӮӢгҒҹгӮҒгҒ«дҪҝз”Ё
      // 0.005гҒ®дҝӮж•°гҒҜеӨүеҢ–йҖҹеәҰгӮ’иӘҝж•ҙгҖӮе°ҸгҒ•гҒ„гҒ»гҒ©гӮҶгҒЈгҒҸгӮҠеӢ•гҒҸ
      let time = frameCount * 0.005;

      translate(width / 2, height / 2);

      // --- й–ўж•°еҢ–гҒ—гҒҹйҹіеҹҹжҸҸз”» ---
      // lowEnergy
      push();
      {
        let energyValue = lowEnergy;
        let baseAmount = 12;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let angle = frameCount * 0.02;
        let dx = sin(angle + time) * baseAmount * intensity;
        let dy = cos(angle + time * 1.5) * baseAmount * intensity;
        console.log("OFFSET lowEnergy:", dx, dy);
        translate(dx, dy);
        let rotation = map(lowEnergy, 50, 200, 0, PI / 3);
        rotate(rotation);
        drawLowEnergy(lowEnergy, frameCount, time);
      }
      pop();

      // midEnergy
      push();
      {
        let energyValue = midEnergy;
        let OFFSET = 2;
        let baseAmount = 10;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET midEnergy:", dx, dy);
        translate(dx, dy);
        drawMidEnergy(midEnergy, frameCount, time);
      }
      pop();

      // highEnergy
      push();
      {
        let energyValue = highEnergy;
        let OFFSET = 3;
        let baseAmount = 16;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET highEnergy:", dx, dy);
        translate(dx, dy);
        drawHighEnergy(highEnergy, frameCount, time);
      }
      pop();

      // subBassEnergy
      push();
      {
        let energyValue = subBassEnergy;
        let OFFSET = 4;
        let baseAmount = 14;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET subBassEnergy:", dx, dy);
        translate(dx, dy);
        drawSubBassEnergy(subBassEnergy, time);
      }
      pop();

      // brillianceEnergy
      push();
      {
        let energyValue = brillianceEnergy;
        let OFFSET = 5;
        let baseAmount = 20;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET brillianceEnergy:", dx, dy);
        translate(dx, dy);
        drawBrillianceEnergy(brillianceEnergy);
      }
      pop();

      // presenceEnergy
      push();
      {
        let energyValue = presenceEnergy;
        let OFFSET = 6;
        let baseAmount = 18;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET presenceEnergy:", dx, dy);
        translate(dx, dy);
        drawPresenceEnergy(presenceEnergy, frameCount);
      }
      pop();

      // lowMidEnergy
      push();
      {
        let energyValue = lowMidEnergy;
        let OFFSET = 7;
        let baseAmount = 11;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET lowMidEnergy:", dx, dy);
        translate(dx, dy);
        drawLowMidEnergy(lowMidEnergy, time);
      }
      pop();

      // upperMidEnergy
      push();
      {
        let energyValue = upperMidEnergy;
        let OFFSET = 8;
        let baseAmount = 13;
        let intensity = map(energyValue, 0, 255, 0, 1);
        let dx = (noise(time + OFFSET) - 0.5) * baseAmount * intensity;
        let dy = (noise(time + OFFSET + 100) - 0.5) * baseAmount * intensity;
        console.log("OFFSET upperMidEnergy:", dx, dy);
        translate(dx, dy);
        drawUpperMidEnergy(upperMidEnergy, time, frameCount);
      }
      pop();
    }

    function keyPressed() {
      // 's'гӮӯгғјгҒҢжҠјгҒ•гӮҢгҒҹгӮүSVGдҝқеӯҳ
      if (key === 's' || key === 'S') {
        save("sound_spatial_composition.svg");
        // PNGдҝқеӯҳгӮӮгҒ—гҒҹгҒ„е ҙеҗҲгҒҜдёӢиЁҳгӮігғЎгғігғҲгӮўгӮҰгғҲи§ЈйҷӨ
        // save("sound_spatial_composition.png");
        // noLoop();
      }
    }

    // --- еҗ„йҹіеҹҹгҒ®жҸҸз”»еҮҰзҗҶ ---
    function drawLowEnergy(lowEnergy, frameCount, time) {
      // --- UIгҒ§жҢҮе®ҡгҒ—гҒҹиүІгғ»еӨӘгҒ•гӮ’йҒ©з”Ё ---
      let c = lowColorPicker.color();
      c.setAlpha(lowAlphaSlider.value());
      stroke(c);
      strokeWeight(lowStrokeSlider.value());
      if (lowEnergy > 50) {
        for (let j = 0; j < 3; j++) {
          noFill();
          beginShape();
          let noiseFactor = map(lowEnergy, 50, 200, 20, 100);
          let angleOffset = frameCount * 0.01 + j * 0.5;
          let detail = map(lowEnergy, 50, 200, 0.3, 0.05); // йҹійҮҸгҒ§зҙ°гҒӢгҒ•гӮ’еӨүеҢ–
          for (let i = 0; i < TWO_PI; i += detail) {
            let r = map(lowEnergy, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor + j * 3;
            let x = r * cos(i);
            let y = r * sin(i);
            vertex(x, y);
          }
          endShape(CLOSE);
        }
      }
    }

    function drawMidEnergy(midEnergy, frameCount, time) {
      let c = midColorPicker.color();
      c.setAlpha(midAlphaSlider.value());
      stroke(c);
      strokeWeight(midStrokeSlider.value());
      if (midEnergy > 40) {
        let baseRadius = map(midEnergy, 50, 200, 90, 300);
        for (let i = 0; i < 5; i++) {
          let angle = random(TWO_PI);
          let r = baseRadius + random(-20, 20);
          point(r * cos(angle), r * sin(angle));
        }
        noFill();
        beginShape();
        for (let i = 0; i < 7; i++) {
          let angle = map(i, 0, 6, 0, TWO_PI) + frameCount * 0.03;
          let radius = baseRadius + sin(frameCount * 0.1 + i) * 30;
          let x = radius * cos(angle);
          let y = radius * sin(angle);
          curveVertex(x, y);
        }
        endShape(CLOSE);
      }
    }

    function drawHighEnergy(highEnergy, frameCount, time) {
      let c = highColorPicker.color();
      c.setAlpha(highAlphaSlider.value());
      stroke(c);
      strokeWeight(highStrokeSlider.value());
      if (highEnergy > 50) {
        noFill();
        for (let i = 0; i < 3; i++) {
          let x1 = random(-320, 320);
          let y1 = random(-20, 20);
          let x2 = x1 + random(30, 70);
          let y2 = y1 + random(-10, 10);
          line(x1, y1, x2, y2);
        }
      }
    }

    function drawSubBassEnergy(subBassEnergy, time) {
      let c = subBassColorPicker.color();
      c.setAlpha(subBassAlphaSlider.value());
      stroke(c);
      strokeWeight(subBassStrokeSlider.value());
      if (subBassEnergy > 30) {
        noFill();
        let radiusBase = map(subBassEnergy, 30, 200, 50, 150);
        let shakeAmount = map(subBassEnergy, 30, 200, 10, 40);
        let cx = (noise(time + 60) - 0.5) * shakeAmount;
        let cy = (noise(time + 70) - 0.5) * shakeAmount;
        ellipse(cx, cy, radiusBase * 2, radiusBase * 2);
      }
    }

    function drawBrillianceEnergy(brillianceEnergy) {
      let c = brillianceColorPicker.color();
      c.setAlpha(brillianceAlphaSlider.value());
      stroke(c);
      strokeWeight(brillianceStrokeSlider.value());
      if (brillianceEnergy > 30) {
        let count = floor(map(brillianceEnergy, 30, 255, 20, 100));
        for (let i = 0; i < count; i++) {
          let angle = random(TWO_PI);
          let radius = random(200, 350);
          let x = radius * cos(angle);
          let y = radius * sin(angle);
          point(x, y);
        }
      }
    }

    function drawPresenceEnergy(presenceEnergy, frameCount) {
      let c = presenceColorPicker.color();
      c.setAlpha(presenceAlphaSlider.value());
      stroke(c);
      strokeWeight(presenceStrokeSlider.value());
      if (presenceEnergy > 30) {
        noFill();
        let sparkCount = 8;
        let maxLength = map(presenceEnergy, 30, 200, 30, 100);
        for (let i = 0; i < sparkCount; i++) {
          let angle = (TWO_PI / sparkCount) * i + frameCount * 0.1;
          let x1 = cos(angle) * 100;
          let y1 = sin(angle) * 100;
          let x2 = x1 + cos(angle) * random(maxLength * 0.5, maxLength);
          let y2 = y1 + sin(angle) * random(maxLength * 0.5, maxLength);
          line(x1, y1, x2, y2);
        }
      }
    }

    function drawLowMidEnergy(lowMidEnergy, time) {
      let c = lowMidColorPicker.color();
      c.setAlpha(lowMidAlphaSlider.value());
      stroke(c);
      strokeWeight(lowMidStrokeSlider.value());
      if (lowMidEnergy > 20) {
        noFill();
        let baseA = map(lowMidEnergy, 20, 200, 80, 220);
        let baseB = map(lowMidEnergy, 20, 200, 60, 180);
        let waviness = map(lowMidEnergy, 20, 200, 6, 25);
        let waveCount = 2 + floor(map(lowMidEnergy, 20, 200, 2, 8));
        beginShape();
        for (let t = 0; t < TWO_PI; t += 0.05) {
          let a = baseA + sin(t * waveCount + time * 2) * waviness;
          let b = baseB + cos(t * waveCount + time * 2) * (waviness * 0.6);
          let x = a * cos(t);
          let y = b * sin(t);
          curveVertex(x, y);
        }
        endShape(CLOSE);
      }
    }

    function drawUpperMidEnergy(upperMidEnergy, time, frameCount) {
      let c = upperMidColorPicker.color();
      c.setAlpha(upperMidAlphaSlider.value());
      stroke(c);
      strokeWeight(upperMidStrokeSlider.value());
      if (upperMidEnergy > 20) {
        noFill();
        let rays = 10 + floor(map(upperMidEnergy, 20, 200, 2, 15));
        let baseLen = map(upperMidEnergy, 20, 200, 120, 300);
        let spin = time * 1.2;
        for (let i = 0; i < rays; i++) {
          let angle = (TWO_PI / rays) * i + spin;
          let len = baseLen + sin(time * 2 + i) * 24 + random(-6, 6);
          let x1 = cos(angle) * 30;
          let y1 = sin(angle) * 30;
          let x2 = cos(angle) * len;
          let y2 = sin(angle) * len;
          line(x1, y1, x2, y2);
        }
      }
    }
  </script>
