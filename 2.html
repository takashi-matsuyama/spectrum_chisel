<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG</title>

  <!-- ライブラリの読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
</head>

<body>
  <script>
    let mic, fft;

    function setup() {
      createCanvas(800, 800, SVG);
      background(255);
      noFill();
      stroke(0, 50); // semi-transparent lines

      mic = new p5.AudioIn('default', () => {
        mic.start();
      });
      mic.start(() => {
        fft = new p5.FFT(0.8, 512); // smoothing: 0.8, bins: 512
        fft.setInput(mic);
        mic.start();
      });

      frameRate(1); // slow down for distinct frames
    }

    function draw() {
      if (!fft) return;

      background(255, 10); // slight fade effect for layering

      let spectrum = fft.analyze();

      translate(width / 2, height / 2);
      beginShape();
      for (let i = 0; i < spectrum.length; i += 5) {
        let angle = map(i, 0, spectrum.length, 0, TWO_PI);
        let amplitude = spectrum[i];
        let r = map(amplitude, 0, 255, 50, 300) * 1.5; // amplify reaction
        r += noise(i * 0.05, frameCount * 0.01) * 100;

        let x = r * cos(angle);
        let y = r * sin(angle);
        curveVertex(x, y);
      }
      endShape(CLOSE);
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        noLoop();
        redraw();
        save("abstract_sound_art.svg");
      }
    }
  </script>
</body>

</html>
