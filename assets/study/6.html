<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Corrected Animation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
</head>

<body>
  <script>
    let mic, fft;
    let history = []; // 音のエネルギー履歴を保存する配列

    function setup() {
      createCanvas(800, 800, SVG);
      strokeCap(ROUND); // 点の先端を丸くする

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.9, 512);
      fft.setInput(mic);

      frameRate(10);
    }

    function draw() {
      if (!mic.enabled || !fft) return;

      // 修正点1: 毎フレーム、背景をクリアして描画をリセット
      background(255);

      // 修正点2: 毎フレーム、描画の基準点を中央に設定
      translate(width / 2, height / 2);

      // 最新の音響データを取得
      let spectrum = fft.analyze();
      if (spectrum.reduce((a, b) => a + b, 0) < 100) return; // 無音時は何もしない

      let lowEnergy = fft.getEnergy("bass");
      let midEnergy = fft.getEnergy("mid");
      let highEnergy = fft.getEnergy("treble");

      // 履歴を更新
      history.push({ low: lowEnergy, mid: midEnergy, high: highEnergy });
      if (history.length > 20) {
        history.shift(); // 履歴が20を超えたら古いものから削除
      }

      // 履歴データに基づいて描画
      for (let t = 0; t < history.length; t++) {
        const e = history[t];
        const ageFactor = map(t, 0, history.length - 1, 0.2, 1); // 古いものほど薄くなる

        // 低音域 - ノイジーなリング
        if (e.low > 50) {
          stroke(0, 200 * ageFactor);
          strokeWeight(map(e.low, 50, 200, 0.3, 1.2) * ageFactor);
          noFill();
          beginShape();
          let noiseFactor = map(e.low, 50, 200, 20, 100);
          let angleOffset = t * 0.1;
          for (let i = 0; i < TWO_PI; i += 0.1) {
            let r = map(e.low, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor;
            let x = r * cos(i);
            let y = r * sin(i);
            vertex(x, y);
          }
          endShape(CLOSE);
        }

        // 中音域 - 渦巻く点
        if (e.mid > 50) {
          stroke(0, 180 * ageFactor);
          strokeWeight(map(e.mid, 50, 200, 0.5, 2) * ageFactor);
          let baseRadius = map(e.mid, 50, 200, 90, 300);
          for (let i = 0; i < 20; i++) {
            let angle = (i / 20) * TWO_PI + t * 0.1;
            let radius = baseRadius + i * map(t, 0, history.length, 0.2, 1);
            let x = radius * cos(angle);
            let y = radius * sin(angle);
            point(x, y);
          }
        }

        // 高音域 - 放射状の線
        if (e.high > 50) {
          stroke(0, 150 * ageFactor);
          strokeWeight(map(e.high, 50, 200, 0.2, 0.8) * ageFactor);
          noFill();
          for (let i = 0; i < 10; i++) {
            let angle = random(TWO_PI) + t * 0.01;
            let r1 = map(e.high, 50, 200, 260, 320);
            let r2 = r1 + random(30, 70);
            let x1 = r1 * cos(angle);
            let y1 = r1 * sin(angle);
            let x2 = r2 * cos(angle);
            let y2 = r2 * sin(angle);
            line(x1, y1, x2, y2);
          }
        }
      }
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        save("sound_art_snapshot.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
