<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Layered</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let mic, fft;
    // 変更点1: 各レイヤー用のグラフィックスバッファを準備
    let lowLayer, midLayer, highLayer;

    function setup() {
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      // 変更点2: 各レイヤーをSVGモードのグラフィックスバッファとして作成
      lowLayer = createGraphics(800, 800, SVG);
      midLayer = createGraphics(800, 800, SVG);
      highLayer = createGraphics(800, 800, SVG);

      // 各バッファの初期設定
      [lowLayer, midLayer, highLayer].forEach(layer => {
        layer.strokeCap(ROUND);
        layer.translate(width / 2, height / 2); // 各バッファの原点を中央に
      });

      background(0);

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.9, 512);
      fft.setInput(mic);

      frameRate(10);
    }

    function draw() {
      if (!mic.enabled || !fft) return;

      let spectrum = fft.analyze();
      if (spectrum.reduce((a, b) => a + b, 0) < 100) return;

      let lowEnergy = fft.getEnergy("bass");
      let midEnergy = fft.getEnergy("mid");
      let highEnergy = fft.getEnergy("treble");

      // 変更点3: 各周波数帯の描画を、対応するレイヤーバッファに対して行う

      // 低音域 -> lowLayerに描画
      if (lowEnergy > 50) {
        lowLayer.stroke(255, 40);
        lowLayer.strokeWeight(map(lowEnergy, 50, 200, 0.3, 1.2));
        lowLayer.noFill();
        lowLayer.beginShape();
        let noiseFactor = map(lowEnergy, 50, 200, 20, 100);
        let angleOffset = frameCount * 0.01;
        for (let i = 0; i < TWO_PI; i += 0.1) {
          let r = map(lowEnergy, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor;
          let x = r * cos(i);
          let y = r * sin(i);
          lowLayer.vertex(x, y);
        }
        lowLayer.endShape(CLOSE);
      }

      // 中音域 -> midLayerに描画
      if (midEnergy > 40) {
        midLayer.stroke(255, 80);
        midLayer.strokeWeight(map(midEnergy, 50, 200, 0.5, 2));
        let baseRadius = map(midEnergy, 50, 200, 90, 300);
        for (let i = 0; i < 5; i++) {
          let angle = random(TWO_PI) + frameCount * 0.05;
          let radius = baseRadius + random(-20, 20);
          let x = radius * cos(angle);
          let y = radius * sin(angle);
          midLayer.point(x, y);
        }
      }

      // 高音域 -> highLayerに描画
      if (highEnergy > 50) {
        highLayer.stroke(255);
        highLayer.strokeWeight(map(highEnergy, 50, 200, 0.2, 0.8));
        highLayer.noFill();
        for (let i = 0; i < 3; i++) {
          let angle = random(TWO_PI);
          let r1 = map(highEnergy, 50, 200, 260, 320);
          let r2 = r1 + random(30, 70);
          let x1 = r1 * cos(angle);
          let y1 = r1 * sin(angle);
          let x2 = r2 * cos(angle);
          let y2 = r2 * sin(angle);
          highLayer.line(x1, y1, x2, y2);
        }
      }

      // 変更点4: メインキャンバスに各レイヤーを画像として描画
      background(0); // 画面をクリア
      image(lowLayer, 0, 0);
      image(midLayer, 0, 0);
      image(highLayer, 0, 0);
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        // 保存する前に、最後に全レイヤーをメインキャンバスに描画し直す
        clear(); // メインキャンバスを完全にクリア
        background(0);
        image(lowLayer, 0, 0);
        image(midLayer, 0, 0);
        image(highLayer, 0, 0);

        save("sound_composition_layered.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
