<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Creature Synthesis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let mic, fft;
    let bodyLayer, detailLayer;

    // 動物の設計図
    let bodyDistortionX, bodyDistortionY;
    let earCount;

    // アタック検知用
    let prevHighEnergy = 0;
    const ATTACK_THRESHOLD = 15;

    function setup() {
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      bodyLayer = createGraphics(800, 800, SVG);
      detailLayer = createGraphics(800, 800, SVG);

      [bodyLayer, detailLayer].forEach(layer => {
        layer.strokeCap(ROUND);
        layer.translate(width / 2, height / 2);
      });

      // 設計図をランダムに生成
      bodyDistortionX = random(0.8, 1.2);
      bodyDistortionY = random(0.8, 1.2);
      earCount = random([2, 3, 4]); // 耳やヒレの数

      background(0);

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.8, 256);
      fft.setInput(mic);
    }

    function draw() {
      if (!mic.enabled || !fft) return;

      let spectrum = fft.analyze();
      let totalEnergy = spectrum.reduce((a, b) => a + b, 0);
      if (totalEnergy < 500) return;

      let lowEnergy = fft.getEnergy("bass");
      let midEnergy = fft.getEnergy("mid");
      let highEnergy = fft.getEnergy("treble");
      let centroid = fft.getCentroid();

      // 生命感: 全体をゆっくり傾ける
      let tilt = map(centroid, 1000, 4000, -0.005, 0.005);
      bodyLayer.rotate(tilt);
      detailLayer.rotate(tilt);

      // 体の輪郭 (低音域)
      if (lowEnergy > 100) {
        bodyLayer.strokeWeight(map(lowEnergy, 100, 255, 0.5, 2));
        bodyLayer.stroke(255, 30);
        bodyLayer.noFill();
        bodyLayer.beginShape();
        let baseRadius = map(lowEnergy, 100, 255, 100, 200);
        // 生命感: 呼吸するような揺らぎ
        let breath = sin(frameCount * 0.1) * 10;
        for (let i = 0; i < spectrum.length; i++) {
          let angle = map(i, 0, spectrum.length, 0, TWO_PI);
          let amp = spectrum[i];
          let r = baseRadius + map(amp, 0, 255, -50, 150) + breath;
          // 設計図に基づいて体を歪ませる
          let x = r * cos(angle) * bodyDistortionX;
          let y = r * sin(angle) * bodyDistortionY;
          bodyLayer.curveVertex(x, y);
        }
        bodyLayer.endShape(CLOSE);
      }

      // 耳やヒレ (中音域)
      if (midEnergy > 80) {
        detailLayer.stroke(255, 100);
        detailLayer.noFill();
        detailLayer.strokeWeight(map(midEnergy, 80, 255, 0.5, 2));
        let earLength = map(midEnergy, 80, 255, 30, 150);
        for (let i = 0; i < earCount; i++) {
          let angle = (TWO_PI / earCount) * i;
          let r1 = 150 * bodyDistortionX; // 体の表面から
          let r2 = r1 + earLength;
          let x1 = r1 * cos(angle);
          let y1 = r1 * sin(angle);
          let x2 = r2 * cos(angle);
          let y2 = r2 * sin(angle);
          detailLayer.line(x1, y1, x2, y2);
        }
      }

      // 目 (高音域のアタック)
      if (highEnergy > prevHighEnergy + ATTACK_THRESHOLD) {
        detailLayer.fill(255, 200);
        detailLayer.noStroke();
        let eyeSize = map(highEnergy, 50, 255, 3, 15);
        let eyeCount = random([1, 2, 3]);
        for (let i = 0; i < eyeCount; i++) {
          let angle = random(TWO_PI);
          let r = random(80, 150);
          let x = r * cos(angle) * bodyDistortionX;
          let y = r * sin(angle) * bodyDistortionY;
          detailLayer.ellipse(x, y, eyeSize, eyeSize);
        }
      }
      prevHighEnergy = highEnergy;

      // 画面に合成して表示
      background(0);
      image(bodyLayer, 0, 0);
      image(detailLayer, 0, 0);
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        clear();
        background(0);
        image(bodyLayer, 0, 0);
        image(detailLayer, 0, 0);
        save("creature_synthesis.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
