<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Spatial Composition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="canvas-container" class="canvas-wrapper"></div>

  <script>
    let mic, fft;
    let lowLayer, midLayer, highLayer;

    // 変更点1: 各レイヤーの中心座標を管理する変数を準備
    let lowCenter, midCenter, highCenter;

    function setup() {
      let myCanvas = createCanvas(800, 800, SVG);
      myCanvas.parent('canvas-container');

      lowLayer = createGraphics(800, 800, SVG);
      midLayer = createGraphics(800, 800, SVG);
      highLayer = createGraphics(800, 800, SVG);

      [lowLayer, midLayer, highLayer].forEach(layer => {
        layer.strokeCap(ROUND);
        // 各レイヤーの内部的な原点を中央に設定
        layer.translate(width / 2, height / 2);
      });

      // 変更点2: 各レイヤーの中心座標を初期化
      lowCenter = createVector(0, 0);
      midCenter = createVector(0, 0);
      highCenter = createVector(0, 0);

      background(0);

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.9, 512);
      fft.setInput(mic);

      frameRate(10);
    }

    function draw() {
      if (!mic.enabled || !fft) return;

      let spectrum = fft.analyze();
      let totalEnergy = spectrum.reduce((a, b) => a + b, 0);
      if (totalEnergy < 500) return;

      let lowEnergy = fft.getEnergy("bass");
      let midEnergy = fft.getEnergy("mid");
      let highEnergy = fft.getEnergy("treble");

      // 変更点3: 音のエネルギーと時間に応じて、各レイヤーの中心座標を更新
      let time = frameCount * 0.005;
      let spread = map(totalEnergy, 500, 10000, 20, 150, true); // 音量が大きいほど広がる

      lowCenter.x = (noise(time) - 0.5) * spread;
      lowCenter.y = (noise(time + 10) - 0.5) * spread;

      midCenter.x = (noise(time + 20) - 0.5) * spread * 0.8; // 少し動きを抑える
      midCenter.y = (noise(time + 30) - 0.5) * spread * 0.8;

      highCenter.x = (noise(time + 40) - 0.5) * spread * 1.2; // 少し動きを大きくする
      highCenter.y = (noise(time + 50) - 0.5) * spread * 1.2;

      // --- 各レイヤーへの描画（この部分は変更なし） ---

      if (lowEnergy > 50) {
        for (let j = 0; j < 3; j++) {
          lowLayer.stroke(255, 10);
          lowLayer.strokeWeight(map(lowEnergy, 50, 200, 0.3, 1.2));
          lowLayer.noFill();
          lowLayer.beginShape();
          let noiseFactor = map(lowEnergy, 50, 200, 20, 100);
          let angleOffset = frameCount * 0.01 + j * 0.5;
          for (let i = 0; i < TWO_PI; i += 0.1) {
            let r = map(lowEnergy, 50, 200, 70, 250) + (noise(i * 5 + angleOffset) - 0.5) * noiseFactor + j * 3;
            let x = r * cos(i);
            let y = r * sin(i);
            lowLayer.vertex(x, y);
          }
          lowLayer.endShape(CLOSE);
        }
      }

      if (midEnergy > 40) {
        midLayer.stroke(255, 20);
        midLayer.strokeWeight(map(midEnergy, 50, 200, 0.5, 2));
        let baseRadius = map(midEnergy, 50, 200, 90, 300);
        for (let i = 0; i < 5; i++) {
          midLayer.point(baseRadius * cos(random(TWO_PI)), baseRadius * sin(random(TWO_PI)));
        }
        midLayer.noFill();
        midLayer.beginShape();
        for (let i = 0; i < 7; i++) {
          let angle = map(i, 0, 6, 0, TWO_PI) + frameCount * 0.03;
          let radius = baseRadius + sin(frameCount * 0.1 + i) * 30;
          midLayer.curveVertex(radius * cos(angle), radius * sin(angle));
        }
        midLayer.endShape(CLOSE);
      }

      if (highEnergy > 50) {
        highLayer.stroke(255, 60);
        highLayer.strokeWeight(map(highEnergy, 50, 200, 0.2, 0.8));
        highLayer.noFill();
        for (let i = 0; i < 3; i++) {
          let angle = random(TWO_PI);
          let r1 = map(highEnergy, 50, 200, 260, 320);
          let r2 = r1 + random(30, 70);
          highLayer.line(r1 * cos(angle), r1 * sin(angle), r2 * cos(angle), r2 * sin(angle));
        }
      }

      // 変更点4: 更新された座標を使って、メインキャンバスに各レイヤーを合成
      background(0);
      image(lowLayer, lowCenter.x, lowCenter.y);
      image(midLayer, midCenter.y, midCenter.x); // xとyを入れ替えて予測不能な動きに
      image(highLayer, highCenter.x, highCenter.y);
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        clear();
        background(0);
        // 保存時も更新された座標で描画
        image(lowLayer, lowCenter.x, lowCenter.y);
        image(midLayer, midCenter.y, midCenter.x);
        image(highLayer, highCenter.x, highCenter.y);

        save("sound_spatial_composition.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
