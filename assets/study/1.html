<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG</title>

  <!-- ライブラリの読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
</head>

<body>
  <script>
    let mic, fft;

    let isRecording = false;
    function setup() {
      createCanvas(800, 800, SVG);
      background(255);
      noFill();
      stroke(0);

      mic = new p5.AudioIn();
      mic.start(() => {
        fft = new p5.FFT();
        fft.setInput(mic);
      });


    }

    function draw() {
      if (!fft) return;

      background(255);
      beginShape();
      let spectrum = fft.analyze();
      for (let i = 0; i < spectrum.length; i += 8) {
        let x = map(i, 0, spectrum.length, 0, width);
        let y = map(spectrum[i], 0, 255, height, 0);
        vertex(x, y);
      }
      endShape();
    }

    function keyPressed() {
      if (!isRecording) {
        isRecording = true;
        //createCanvas(800, 800, SVG);
        redraw(); // triggers draw() once in SVG mode
        save("sound_wave.svg");
        isRecording = false;
        createCanvas(800, 800); // reset back to normal canvas
      }
    }
  </script>
</body>

</html>
