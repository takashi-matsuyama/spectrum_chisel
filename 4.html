<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Sound to SVG - Plotter/Print Friendly</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
</head>

<body>
  <script>
    let mic, fft;

    function setup() {
      createCanvas(800, 800, SVG);
      background(255);

      // 点の先端を丸くする設定
      strokeCap(ROUND);

      mic = new p5.AudioIn();
      mic.start();
      fft = new p5.FFT(0.9, 512);
      fft.setInput(mic);

      frameRate(10);
    }

    function draw() {
      if (!mic.enabled || !fft) return;

      translate(width / 2, height / 2);
      let spectrum = fft.analyze();
      if (spectrum.reduce((a, b) => a + b, 0) < 1000) return;

      // 放射状の波形（これは線なので問題なし）
      stroke(0, 50);
      strokeWeight(1); // 線の太さを指定
      noFill();
      beginShape();
      for (let i = 0; i < TWO_PI; i += 0.05) {
        let index = int(map(i, 0, TWO_PI, 0, 255));
        let amp = spectrum[index];
        let r = map(amp, 0, 255, 50, 400) + random(-10, 10);
        let x = r * cos(i);
        let y = r * sin(i);
        curveVertex(x, y);
      }
      endShape(CLOSE);

      // --- 改良版：音量に応じたPerlinノイズの点描 ---
      stroke(0); // プロッター向けに黒のストロークのみ
      noFill();
      let noiseScale = 0.02;
      let spectrumLen = spectrum.length;

      for (let i = 0; i < 100; i++) {
        let angle = random(TWO_PI);
        let ampIndex = int(map(angle, 0, TWO_PI, 0, spectrumLen));
        let amp = spectrum[ampIndex];

        if (amp > 100) { // 音がある程度ある場合のみ描画
          let n = noise(i * noiseScale, frameCount * 0.01);
          let radius = map(n, 0, 1, 100, 400);
          let x = radius * cos(angle);
          let y = radius * sin(angle);

          strokeWeight(map(amp, 0, 255, 0.3, 1.5));
          point(x, y);
        }
      }
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        save("plotter_friendly_art.svg");
        noLoop();
      }
    }
  </script>
</body>

</html>
